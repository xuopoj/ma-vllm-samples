notes: 'GLM-5.1-w8a8 (Eco-Tech/GLM-5.1-w8a8), 2x A3 (16 NPU/node) single mixed engine, DP=2 x TP=16 (dp-local=1, one DP rank per node). rank0=leader (API :8080), rank1=headless. The GLM5.html page covers GLM-5/GLM-5.1 with identical commands; extracted the A3 w8a8 multi-node block. served-model-name glm-5, speculative deepseek_mtp (GLM own MTP). headless node keeps --data-parallel-start-rank (no per-node API server). Deviations: /root/model (not vllm-ascend/GLM5-w8a8), --port 8080 (upstream 8077); NIC/IP resolved at runtime via the spine (upstream had placeholder nic_name/local_ip/node0_ip).'
