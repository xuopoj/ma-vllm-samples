# Provenance for this deployment. See CLAUDE.md "Deployment provenance".
source: https://docs.vllm.ai/projects/ascend/en/latest/tutorials/models/GLM5.html
derived: 2026-06-30      # half-decode variant of 1x2p1x4d (extracted from the GLM-5 upstream PD guide, A3 w8a8)
vllm: bundled-in-image   # upstream page pins no vLLM version; use the vLLM shipped in the vllm-ascend image
vllm_ascend: TODO        # upstream gives no image tag; set to the GLM-5.1-capable vllm-ascend tag (A3) before deploy
verified: false          # derived from 1x2p1x4d, NOT validated on hardware
notes: 'GLM-5.1-w8a8 (Eco-Tech/GLM-5.1-w8a8) PD on 4x A3 (16 NPU/node): 1 prefill engine spanning 2 nodes (DP=2 x TP=16, dp-local=1, 1 instance/node, kv_producer 30000) + 1 decode engine spanning 2 nodes (DP=8 x TP=4, dp-local=4, 4 instances/node, kv_consumer 30100). This is the half-decode sibling of 1x2p1x4d: prefill side is IDENTICAL (DP=2 x TP=16), decode shrunk from 4 nodes (DP=16) to 2 nodes (DP=8); per-decode-instance sizing (TP=4, 4 NPU, max-num-seqs 8) is unchanged. External online DP (launch_online_dp.py + run_dp_template_{prefill,decode}.sh with --data-parallel-rank per instance). MooncakeConnectorV1, kv_connector_extra_config prefill{dp 2,tp 16}/decode{dp 8,tp 4} on BOTH roles, use_ascend_direct. Proxy load_balance_proxy_server_example.py (non-layerwise, vendored) fans 2 prefill + 8 decode endpoints. tool-call-parser glm47, reasoning-parser glm45, speculative deepseek_mtp. The GLM5.html page covers GLM-5/GLM-5.1 with identical commands; extracted the w8a8 PD block. Deviations from upstream: /root/model; NIC/IP + master addrs resolved at runtime via the spine; rpc-ports 10521 (prefill) / 10523 (decode) and vllm-start-ports 9081 / 9900 kept; added LD_LIBRARY_PATH=/usr/local/lib for Mooncake ascend_transport.so (ModelArts sh launch); DROPPED upstream --profiler-config (a debug artifact, not a serving flag). kv_ports per upstream. Note: prefill --max-model-len 131072 vs decode 200000 is asymmetric BY DESIGN per upstream 5.3 -- not an introduced inconsistency; do not "fix" to match. The smaller decode is NOT separately documented upstream (upstream shows the 4-node decode); treat as a derived starting point -- the decode DP=8 fan-out and the dp_size=8 in kv_connector_extra_config are the only changes vs the validated-shape 1x2p1x4d.'
