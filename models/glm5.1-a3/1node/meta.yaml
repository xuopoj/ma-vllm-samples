# Provenance for this deployment. See CLAUDE.md "Deployment provenance".
source: https://docs.vllm.ai/projects/ascend/en/latest/tutorials/models/GLM5.html
derived: 2026-06-28      # extracted from the GLM-5 upstream tutorial (Single-Node A3, w8a8)
vllm: bundled-in-image   # upstream page pins no vLLM version; use the vLLM shipped in the vllm-ascend image
vllm_ascend: TODO        # upstream gives no image tag; set to the GLM-5.1-capable vllm-ascend tag (A3) before deploy
verified: false          # derived from upstream, NOT validated on hardware
notes: 'GLM-5.1-w8a8 (Eco-Tech/GLM-5.1-w8a8), single A3 node (16 NPU), DP=1 x TP=16. The GLM5.html page covers GLM-5 and GLM-5.1 with identical commands (model weights differ only); extracted the A3 w8a8 single-node block. served-model-name glm-5 (upstream; the name clients call). Speculative method deepseek_mtp is GLM-5/5.1 own MTP per upstream. Deviations: /root/model (not modelscope cache vllm-ascend/GLM5-w8a8), --port 8080 (upstream 8077). env (HCCL_*, VLLM_ASCEND_BALANCE_SCHEDULING/MLAPO/FLASHCOMM1) and serve flags kept verbatim.'
