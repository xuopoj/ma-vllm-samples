# Provenance for this deployment. See CLAUDE.md "Deployment provenance".
source: https://docs.vllm.ai/projects/ascend/en/latest/tutorials/models/DeepSeek-V4-Flash.html
derived: 2026-06-30      # multiplied the verified 1p1d single-node engines into 2P+2D
vllm: bundled-in-image   # upstream page pins no vLLM version; use the vLLM shipped in the vllm-ascend image
vllm_ascend: quay.io/ascend/vllm-ascend:v0.21.0rc1-a3
verified: false          # DERIVED from 1p1d, NOT validated on hardware
notes: 'DeepSeek-V4-Flash-w8a8-mtp PD on 4x A3 (16 NPU/node): 2 INDEPENDENT single-node prefill engines (each DP=4 x TP=4, 4 instances 7100..7103, kv_producer, engine_id 0/2) + 2 INDEPENDENT single-node decode engines (each DP=16 x TP=1, 16 instances 7100..7115, kv_consumer, engine_id 1/3). External online DP (launch_online_dp.py + parameterized run_dp_template_{prefill,decode}.sh; ENGINE_ID/KV_PORT exported per node by run.sh). MooncakeHybridConnector, kv_connector_extra_config prefill{dp 4,tp 4}/decode{dp 16,tp 1} on every engine. Proxy load_balance_proxy_server_example.py (non-layerwise, vendored) fans 8 prefill + 32 decode endpoints. DERIVED from the verified 1p1d layout by running multiple independent same-role engines; upstream documents only 1P1D, so the multi-engine fan-out is NOT separately validated. Per-engine sizing/flags are identical to 1p1d. engine_id is globally unique (prefill even, decode odd); kv_port stays 36000/36100 because engines are on distinct nodes (only engine_id must differ). kv_port 36000/36100 deviate from upstream 30000/30100: the official kv_port table reserves [20000,36000) for AscendDirectTransport on 16-NPU nodes. Deviations from upstream: /root/model; NIC/IP resolved at runtime via the spine; LD_LIBRARY_PATH=/usr/local/lib for Mooncake ascend_transport.so (ModelArts sh launch). Treat as a starting point: a multi-P/multi-D fan-out can still hit a KV-transport clash or proxy mis-route that 1p1d would not.'
